services:
  postgres-0:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata0:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d urlshortener"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-1:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5433:5432"
    volumes:
      - pgdata1:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d urlshortener"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    expose:
      - "8080"
    deploy:
      replicas: 3
    depends_on:
      postgres-0:
        condition: service_healthy
      postgres-1:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SHARDING_SHARDS_0_URL: jdbc:postgresql://postgres-0:5432/urlshortener
      SHARDING_SHARDS_0_USERNAME: app
      SHARDING_SHARDS_0_PASSWORD: app
      SHARDING_SHARDS_1_URL: jdbc:postgresql://postgres-1:5432/urlshortener
      SHARDING_SHARDS_1_USERNAME: app
      SHARDING_SHARDS_1_PASSWORD: app
      SPRING_DATA_REDIS_HOST: redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  k6:
    image: grafana/k6:latest
    profiles: [load-test]
    working_dir: /scripts
    volumes:
      - ./load-test:/scripts
    environment:
      BASE_URL: http://nginx:80
    depends_on:
      - nginx

volumes:
  pgdata0:
  pgdata1:
